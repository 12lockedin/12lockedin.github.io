name: Actualizar datos de horarios

# Mantiene los JSON de datos al día sin intervención manual.
# - schedule: una vez por semana, refresca el catálogo + los planes ya presentes.
# - workflow_dispatch: ejecución manual, con modo elegible.
on:
  schedule:
    - cron: "17 4 * * 1" # lunes 04:17 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Qué scrapear"
        type: choice
        default: refresh
        options: [refresh, catalog, all]

permissions:
  contents: write

concurrency:
  group: scrape-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Scrapear
        working-directory: scraper
        run: python scrape.py "${{ github.event.inputs.mode || 'refresh' }}"

      - name: Commit de datos si hay cambios
        run: |
          git config user.name "schedule-data-bot"
          git config user.email "schedule-data-bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "data: actualización automática de horarios ($(date -u +%Y-%m-%d))"
            git push
          fi
